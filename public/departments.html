<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأقسام - HR Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <header class="header">
      <div class="header-right">
        <h1>إدارة الأقسام</h1>
        <p>إدارة أقسام الشركة والهيكل التنظيمي</p>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">
        <span><i class="fa-solid fa-plus"></i></span> إضافة قسم
      </button>
    </header>

    <div class="filters-bar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="البحث في الأقسام..." oninput="handleSearch()">
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>القسم</th>
            <th>الوصف</th>
            <th>المدير</th>
            <th>عدد الموظفين</th>
            <th>الحالة</th>
            <th>الإجراءات</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="6" class="loading-cell">جاري التحميل...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="departmentModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">إضافة قسم جديد</h2>
        <button class="modal-close" onclick="closeModal('departmentModal')">✕</button>
      </div>
      <form onsubmit="handleSubmit(event)">
        <input type="hidden" id="departmentId">
        <div class="form-grid">
          <div class="form-group">
            <label>اسم القسم</label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group">
            <label>المدير</label>
            <select id="managerId">
              <option value="">-- اختر المدير --</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label>الوصف</label>
            <textarea id="description" placeholder="وصف القسم ومسؤولياته..."></textarea>
          </div>
          <div class="form-group">
            <label>الحالة</label>
            <select id="status">
              <option value="active">نشط</option>
              <option value="inactive">غير نشط</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('departmentModal')">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/sidebar.js"></script>
  <script>
    let currentCompanyId = '00000000-0000-0000-0000-000000000001';
    let departments = [];
    let employees = [];

    // Load data
    async function loadData() {
      const urlParams = new URLSearchParams(window.location.search);
      const forcedCompanyId = urlParams.get('company_id');
      if (forcedCompanyId) currentCompanyId = forcedCompanyId;

      try {
        // Fetch all departments
        let deptRes = await api.getAll('departments');

        // Fetch employees for manager selection
        let empRes = await api.getAll('employees');

        if (forcedCompanyId) {
          // Filter everything by company
          deptRes = deptRes.filter(d => d.company_id === forcedCompanyId);
          empRes = empRes.filter(e => e.company_id === forcedCompanyId);

          // Try to set title
          const companies = await api.getAll('companies');
          const comp = companies.find(c => c.id === forcedCompanyId);
          if (comp) {
            document.querySelector('.header-right p').textContent = `إدارة الأقسام - ${comp.name}`;
          }
        }

        departments = deptRes;
        employees = empRes;

        renderTable();
        populateManagerSelect();
      } catch (error) {
        showNotification('حدث خطأ في تحميل البيانات: ' + error.message, 'error');
      }
    }

    // Populate manager select
    function populateManagerSelect() {
      const select = document.getElementById('managerId');
      select.innerHTML = '<option value="">-- اختر المدير --</option>';
      employees.forEach(emp => {
        select.innerHTML += `<option value="${emp.id}">${emp.full_name}</option>`;
      });
    }

    // Render table
    function renderTable(data = departments) {
      const tbody = document.getElementById('tableBody');

      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="loading-cell">لا توجد أقسام</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(dept => {
        const manager = employees.find(e => e.id === dept.manager_id);
        const empCount = employees.filter(e => e.department_id === dept.id).length;

        return `
          <tr>
            <td>
              <div class="employee-cell">
                <div class="employee-avatar" style="background: ${getAvatarColor(dept.name)}">
                  <i class="fa-solid fa-building"></i>
                </div>
                <span>${dept.name}</span>
              </div>
            </td>
            <td>${dept.description || '-'}</td>
            <td>${manager?.full_name || '-'}</td>
            <td>${empCount}</td>
            <td><span class="status-badge ${dept.status || 'active'}">${dept.status === 'inactive' ? 'غير نشط' : 'نشط'}</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-icon edit" onclick="editDepartment('${dept.id}')"><i class="fa-solid fa-pen"></i></button>
                <a href="/employees.html?department_id=${dept.id}&company_id=${currentCompanyId}" class="btn-icon" title="عرض موظفي القسم" style="color:#0ea5e9"><i class="fa-solid fa-users"></i></a>
                <button class="btn-icon delete" onclick="deleteDepartment('${dept.id}')"><i class="fa-solid fa-trash"></i></button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    // Search
    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = departments.filter(d =>
        d.name?.toLowerCase().includes(query) ||
        d.description?.toLowerCase().includes(query)
      );
      renderTable(filtered);
    }

    // Open add modal
    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'إضافة قسم جديد';
      document.getElementById('departmentId').value = '';
      document.getElementById('name').value = '';
      document.getElementById('description').value = '';
      document.getElementById('managerId').value = '';
      document.getElementById('status').value = 'active';
      openModal('departmentModal');
    }

    // Edit
    function editDepartment(id) {
      const dept = departments.find(d => d.id === id);
      if (!dept) return;

      document.getElementById('modalTitle').textContent = 'تعديل القسم';
      document.getElementById('departmentId').value = dept.id;
      document.getElementById('name').value = dept.name || '';
      document.getElementById('description').value = dept.description || '';
      document.getElementById('managerId').value = dept.manager_id || '';
      document.getElementById('status').value = dept.status || 'active';
      openModal('departmentModal');
    }

    // Submit
    async function handleSubmit(e) {
      e.preventDefault();

      const id = document.getElementById('departmentId').value;
      const data = {
        name: document.getElementById('name').value,
        description: document.getElementById('description').value,
        manager_id: document.getElementById('managerId').value || null,
        status: document.getElementById('status').value,
        company_id: currentCompanyId
      };

      try {
        if (id) {
          await api.update('departments', id, data);
          showNotification('تم تحديث القسم بنجاح');
        } else {
          await api.create('departments', data);
          showNotification('تم إضافة القسم بنجاح');
        }
        closeModal('departmentModal');
        loadData();
      } catch (error) {
        showNotification('حدث خطأ: ' + error.message, 'error');
      }
    }

    // Delete
    async function deleteDepartment(id) {
      if (!confirm('هل أنت متأكد من حذف هذا القسم؟')) return;

      try {
        await api.delete('departments', id);
        showNotification('تم حذف القسم بنجاح');
        loadData();
      } catch (error) {
        showNotification('حدث خطأ: ' + error.message, 'error');
      }
    }

    // Init
    checkAuth();
    loadData();
  </script>
</body>

</html>
